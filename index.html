<!doctype html>
<html lang="ja" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>バトルログ チャンピオンズ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="style-stage" aria-hidden="true">
      <span class="stage-word">BATTLE</span>
      <span class="stage-slash slash-one"></span>
      <span class="stage-slash slash-two"></span>
    </div>

    <nav class="navbar" aria-label="メインナビゲーション">
      <a class="navbar-brand" href="#top" aria-label="トップへ">
        <span class="brand-mark">CL</span>
        <span class="brand-text"><strong>バトルログ</strong><small>Champions</small></span>
      </a>
      <div class="navbar-menu">
        <a href="#recordTitle">記録</a>
        <a href="#seasonTitle">シーズン</a>
        <a href="#reviewTitle">振り返り</a>
      </div>
      <button class="button is-danger is-outlined hidden" id="logoutButton" type="button">ログアウト</button>
    </nav>

    <section class="auth-screen" id="authScreen" aria-labelledby="authTitle">
      <div class="auth-card">
        <p class="eyebrow">Private Battle Database</p>
        <h1 id="authTitle">バトルログにログイン</h1>
        <p>登録済みのメールアドレスとパスワードを入力してください。</p>
        <form id="authForm">
          <label class="field">
            <span class="label">メールアドレス</span>
            <input class="input" id="authEmail" type="email" autocomplete="email" required />
          </label>
          <label class="field">
            <span class="label">パスワード</span>
            <input class="input" id="authPassword" type="password" autocomplete="current-password" required />
          </label>
          <p class="form-error" id="authError" role="alert"></p>
          <button class="button is-danger is-fullwidth" type="submit">ログイン</button>
        </form>
      </div>
    </section>

    <main id="appRoot" class="hidden">
      <section class="hero">
        <div class="hero-body">
          <span class="tag is-danger is-light is-rounded" id="storageStatus">クラウド接続中</span>
          <h1><span>バトルログ</span><span>チャンピオンズ</span></h1>
          <p>勝敗、パーティ、メモを安全なクラウドに保存します。</p>
        </div>
      </section>

      <div class="container app-shell">
        <section class="panel record-panel" aria-labelledby="recordTitle">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Battle</p>
              <h2 id="recordTitle">試合を記録</h2>
            </div>
            <button class="button is-light hidden" id="cancelEditButton" type="button">編集をやめる</button>
          </div>
          <div class="panel-block panel-content">
            <form id="recordForm" autocomplete="off">
              <input type="hidden" id="recordId" />
              <div class="field-grid compact">
                <label class="field">
                  <span class="label">勝敗</span>
                  <select id="resultInput" class="select">
                    <option value="win">勝ち</option>
                    <option value="loss">負け</option>
                  </select>
                </label>
                <label class="field">
                  <span class="label">日時</span>
                  <input id="playedAtInput" class="input" type="datetime-local" />
                </label>
              </div>

              <div class="party-block">
                <h3>自分のパーティ</h3>
                <div class="party-grid" id="myPartyInputs"></div>
              </div>

              <div class="preset-box">
                <div class="preset-controls">
                  <label class="field">
                    <span class="label">この自分パーティを登録</span>
                    <input id="partyPresetNameInput" class="input" type="text" placeholder="例: 雨パ、ランク用A" />
                  </label>
                  <button class="button is-danger is-light" id="savePartyPresetButton" type="button">登録</button>
                </div>
                <div class="preset-list" id="partyPresetList"></div>
              </div>

              <div class="party-block">
                <h3>相手のパーティ</h3>
                <div class="party-grid" id="opponentPartyInputs"></div>
              </div>

              <label class="field memo-field">
                <span class="label">メモ</span>
                <textarea id="memoInput" class="textarea" rows="4" placeholder="選出、勝因、よかった動きなど"></textarea>
              </label>
              <button class="button is-danger is-fullwidth" id="saveRecordButton" type="submit">記録する</button>
            </form>
          </div>
        </section>

        <section class="panel season-panel" aria-labelledby="seasonTitle">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Season</p>
              <h2 id="seasonTitle">シーズン管理</h2>
            </div>
          </div>
          <div class="panel-block panel-content">
            <form id="seasonForm" autocomplete="off">
              <input type="hidden" id="seasonId" />
              <label class="field">
                <span class="label">シーズン名</span>
                <input id="seasonNameInput" class="input" type="text" placeholder="例: シーズン1" />
              </label>
              <div class="field-grid compact">
                <label class="field">
                  <span class="label">開始日</span>
                  <input id="seasonStartInput" class="input" type="date" />
                </label>
                <label class="field">
                  <span class="label">終了日</span>
                  <input id="seasonEndInput" class="input" type="date" />
                </label>
              </div>
              <p class="form-error" id="seasonError" role="alert"></p>
              <button class="button is-danger is-light is-fullwidth" type="submit">シーズンを保存</button>
            </form>
            <div class="season-list" id="seasonList"></div>
          </div>
        </section>

        <section class="review-section" aria-labelledby="reviewTitle">
          <div class="section-title-row">
            <div>
              <p class="eyebrow">Review</p>
              <h2 id="reviewTitle">振り返り</h2>
            </div>
            <span class="tag is-danger is-light is-rounded">Battle Database</span>
          </div>
          <div class="stats-grid" id="statsGrid"></div>
          <div class="panel filters-panel">
            <div class="panel-heading"><h2>絞り込み</h2></div>
            <div class="panel-block panel-content">
              <div class="field-grid filters">
                <label class="field">
                  <span class="label">シーズン</span>
                  <select id="filterSeason" class="select"></select>
                </label>
                <label class="field">
                  <span class="label">勝敗</span>
                  <select id="filterResult" class="select">
                    <option value="all">すべて</option>
                    <option value="win">勝ち</option>
                    <option value="loss">負け</option>
                  </select>
                </label>
                <label class="field">
                  <span class="label">開始日</span>
                  <input id="filterStart" class="input" type="date" />
                </label>
                <label class="field">
                  <span class="label">終了日</span>
                  <input id="filterEnd" class="input" type="date" />
                </label>
              </div>
            </div>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>
      </div>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
